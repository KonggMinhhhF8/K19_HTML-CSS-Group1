<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Careers page</title>

    <link rel="stylesheet" href="assets/css/careerPage.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-[#0F0F0F] font-family: Roboto;">
    <div class="pt-[30px] px-[50px] pb-[50px] min-h-screen w-[1920px]">
      <!-- nav container 1 -->
      <nav
        class="p-6 w-[1820px] flex items-center justify-between bg-[#1A1A1A]"
      >
        <img
          src="assets/images/Logo.png"
          class="h-6 w-[130px] pl-[50px] object-contain"
          alt="logo"
        />
        <div class="flex gap-4 text-[#81807E]">
          <a
            href="#!"
            class="inline-block home px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >Home</a
          >
          <a
            href="#!"
            class="inline-block service px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >Service</a
          >
          <a
            href="#!"
            class="inline-block projects px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >Projects</a
          >
          <a
            href="#!"
            class="inline-block about px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >About</a
          >
          <a
            href="#!"
            class="inline-block careers px-6 py-[18px] bg-[#0F0F0F] rounded-lg text-[#E7BEB1]"
            >Careers</a
          >
          <a
            href="#!"
            class="inline-block blogs px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >Blogs</a
          >
          <a
            href="#!"
            class="inline-block blogs px-6 py-[18px] bg-[#0F0F0F] rounded-lg hover:text-[#E7BEB1]"
            >Blogs</a
          >
          <a
            href="#!"
            class="inline-block contactUs px-6 py-[18px] bg-[#CE7D63] rounded-lg text-[#0F0F0F]"
            >Contact Us</a
          >
        </div>
      </nav>
      <!-- Container 2 -->
      <div class="container2 flex gap-4">
        <div class="header flex gap-6">
          <p
            class="text-[#F9EFEC] text-[68px] leading-[150%] tracking-[0%] uppercase; font-style: SemiBold"
          >
            Unlock Your Potential
          </p>
          <!-- Icon header -->
          <span class="header__iconWrapper flex items-center relative">
            <div
              class="w-[77px] h-[77px] bg-[url('assets/images/Shape.svg')] bg-contain bg-no-repeat bg-center"
            ></div>
            <div
              class="absolute inset-0 flex items-center justify-center right-47"
            >
              <div
                class="flex items-center justify-center h-[52px] w-[52px] rounded-full bg-[#CE7D63]"
              >
                <div
                  class="w-[18px] h-[15px] bg-[url('assets/images/Icon.svg')] bg-contain bg-no-repeat bg-center"
                ></div>
              </div>
            </div>
            <p
              class="font-medium text-2xl leading-[150%] tracking-[0%] uppercase; font-style: Medium; leading-trim: NONE; text-[#CE7D63]"
            >
              Start a project
            </p>
          </span>
          <p
            class="text-[#F9EFEC] text-[68px] leading-[150%] tracking-[0%] uppercase; font-style: SemiBold"
          >
            IN The DIGITAl WORLD
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
